services:
  # Version actuelle (Blue)
  api-blue:
    build: .
    container_name: todo-api-blue
    restart: unless-stopped
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      APP_KEY: ${APP_KEY}
      APP_VERSION: "1.0.0-blue"
    depends_on:
      db:
        condition: service_healthy

  # Nouvelle version (Green)
  api-green:
    build: .
    container_name: todo-api-green
    restart: unless-stopped
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      APP_KEY: ${APP_KEY}
      APP_VERSION: "2.0.0-green"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16.3-alpine
    container_name: todo-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: todo-redis-prod
    restart: unless-stopped

  nginx:
    image: nginx:1.27.0-alpine
    container_name: todo-nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/blue-green.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-blue
      - api-green
    restart: unless-stopped

volumes:
  pgdata_prod:
