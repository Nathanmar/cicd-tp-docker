services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/app:latest
    restart: always
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-prod-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always

volumes:
  db-prod-data:
