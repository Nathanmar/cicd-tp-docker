upstream active_backend {
    server api-blue:9000;
}

upstream standby_backend {
    server api-green:9000;
}

server {
    listen 80;
    index index.php index.html;
    root /var/www/html/public;

    # Tout le trafic va vers l'environnement actif
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Endpoint de test pour l'environnement standby (pour vérifier avant la bascule)
    location /test-standby/ {
        alias /var/www/html/public/;
        try_files $uri $uri/ @standby;
    }

    location @standby {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_pass standby_backend;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass active_backend;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location /health {
        try_files $uri $uri/ /index.php?$query_string;
        access_log off;
    }
}
